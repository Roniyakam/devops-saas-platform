---
# Bootstrap des secrets Vault consommés par Celery (S2) et PostgreSQL (S3) —
# sépare le contenu (ce playbook, rejouable indépendamment) du déploiement
# de Vault lui-même (deploy-vault.yml). Crée :
#   - secret/celery/rabbitmq   : utilisateur RabbitMQ dédié celery-worker
#                                (mot de passe généré, jamais en clair ici)
#   - secret/rabbitmq/admin    : miroir du compte admin RabbitMQ existant
#   - l'utilisateur RabbitMQ celery-worker lui-même (least privilege, vhost
#     "/" uniquement, pas de tag administrator)
#   - secret/postgres/superuser : mot de passe généré pour le rôle "postgres"
#                                 (consommé par roles/postgres_ha)
#   - secret/postgres/app       : mot de passe généré pour le rôle "appuser"
#                                 (consommé par roles/postgres_ha)
#   - secret/kubernetes-security-runtime/webhook-token : token partagé
#     généré pour le webhook S2 de kubernetes-security-runtime (décision 3,
#     kubernetes-security-runtime/docs/cadrage-s2-webhook-response.md) —
#     en plus de l'écriture dans Vault, ce bloc pousse aussi le Secret
#     Kubernetes "webhook-token" (namespace falco) que le Deployment webhook
#     et le subchart falcosidekick consomment via secretKeyRef (pas de
#     Vault Agent Injector ici : le webhook n'est pas dans le mesh Vault K8s
#     auth existant, voir kubernetes-security-runtime/docs/known-issues.md).
# Idempotent : chaque écriture est gardée par une lecture préalable.
# Usage : ansible-playbook -i inventories/scaleway/hosts.ini playbooks/deploy-vault-secrets.yml --vault-password-file ~/.vault_pass

- name: Bootstrap des secrets Vault pour Celery + RabbitMQ + PostgreSQL + webhook S2
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - ../roles/vault/defaults/main.yml
    - ../roles/k8s_master/defaults/main.yml
    - ../vault.yml
  vars:
    vault_secrets_rabbitmq_namespace: "rabbitmq"
    vault_secrets_rabbitmq_pod: "rabbitmq-0"
    vault_secrets_celery_namespace: "celery"
    vault_secrets_webhook_namespace: "falco"
  environment:
    KUBECONFIG: "{{ vault_kubeconfig_path }}"

  tasks:
    # Bloc entier non simulable en --check : dépend d'un root token lu sur le
    # Vault réel (voir le même garde-fou dans roles/vault/tasks/main.yml).
    - name: Bootstrap des secrets et restauration des consommateurs
      when: not ansible_check_mode
      block:
        - name: Lire vault-init.yml pour obtenir le root token
          ansible.builtin.command: >-
            ansible-vault view
            --vault-password-file {{ vault_init_vault_password_file | expanduser }}
            {{ vault_init_file_path }}
          register: vault_secrets_init_file_content
          changed_when: false
          no_log: true
          tags: [vault, secrets]

        - name: Extraire le root token
          ansible.builtin.set_fact:
            vault_root_token: "{{ (vault_secrets_init_file_content.stdout | from_json).root_token }}"
          no_log: true
          tags: [vault, secrets]

        # --- secret/celery/rabbitmq : utilisateur celery-worker ---

        - name: Vérifier si secret/celery/rabbitmq existe déjà dans Vault
          ansible.builtin.command: >-
            kubectl exec -n {{ vault_namespace }} {{ vault_release_name }}-0 -- sh -c
            'VAULT_TOKEN={{ vault_root_token }} vault kv get -field=password secret/celery/rabbitmq'
          register: vault_celery_secret_check
          changed_when: false
          failed_when: false
          no_log: true
          tags: [vault, secrets]

        - name: Déterminer le mot de passe celery-worker (existant ou généré)
          ansible.builtin.set_fact:
            vault_celery_worker_password: >-
              {{ vault_celery_secret_check.stdout
              if vault_celery_secret_check.rc == 0
              else lookup('ansible.builtin.password', '/dev/null length=32 chars=ascii_letters,digits') }}
          no_log: true
          tags: [vault, secrets]

        - name: Écrire secret/celery/rabbitmq dans Vault
          ansible.builtin.command: >-
            kubectl exec -n {{ vault_namespace }} {{ vault_release_name }}-0 -- sh -c
            'VAULT_TOKEN={{ vault_root_token }} vault kv put secret/celery/rabbitmq
            username=celery-worker
            password={{ vault_celery_worker_password }}'
          when: vault_celery_secret_check.rc != 0
          changed_when: true
          no_log: true
          tags: [vault, secrets]

        # --- secret/rabbitmq/admin : miroir du compte admin existant ---

        - name: Vérifier si secret/rabbitmq/admin existe déjà dans Vault
          ansible.builtin.command: >-
            kubectl exec -n {{ vault_namespace }} {{ vault_release_name }}-0 -- sh -c
            'VAULT_TOKEN={{ vault_root_token }} vault kv get -field=password secret/rabbitmq/admin'
          register: vault_rabbitmq_admin_secret_check
          changed_when: false
          failed_when: false
          no_log: true
          tags: [vault, secrets]

        - name: Lire le mot de passe admin RabbitMQ réel (Secret Kubernetes)
          ansible.builtin.command: >-
            kubectl get secret rabbitmq -n {{ vault_secrets_rabbitmq_namespace }}
            -o jsonpath={.data.rabbitmq-password}
          register: vault_rabbitmq_admin_password_b64
          when: vault_rabbitmq_admin_secret_check.rc != 0
          changed_when: false
          no_log: true
          tags: [vault, secrets]

        - name: Écrire secret/rabbitmq/admin dans Vault
          ansible.builtin.command: >-
            kubectl exec -n {{ vault_namespace }} {{ vault_release_name }}-0 -- sh -c
            'VAULT_TOKEN={{ vault_root_token }} vault kv put secret/rabbitmq/admin
            username=rabbitmq
            password={{ vault_rabbitmq_admin_password_b64.stdout | b64decode }}'
          when: vault_rabbitmq_admin_secret_check.rc != 0
          changed_when: true
          no_log: true
          tags: [vault, secrets]

        # --- Utilisateur RabbitMQ celery-worker (least privilege) ---

        - name: Lister les utilisateurs RabbitMQ existants
          ansible.builtin.command: >-
            kubectl exec -n {{ vault_secrets_rabbitmq_namespace }} {{ vault_secrets_rabbitmq_pod }} --
            rabbitmqctl list_users
          register: vault_rabbitmq_users
          changed_when: false
          tags: [vault, rabbitmq]

        - name: Créer l'utilisateur RabbitMQ celery-worker
          ansible.builtin.command: >-
            kubectl exec -n {{ vault_secrets_rabbitmq_namespace }} {{ vault_secrets_rabbitmq_pod }} --
            rabbitmqctl add_user celery-worker {{ vault_celery_worker_password }}
          when: "'celery-worker' not in vault_rabbitmq_users.stdout"
          changed_when: true
          no_log: true
          tags: [vault, rabbitmq]

        - name: Donner à celery-worker les permissions sur le vhost par défaut
          ansible.builtin.command: >-
            kubectl exec -n {{ vault_secrets_rabbitmq_namespace }} {{ vault_secrets_rabbitmq_pod }} --
            rabbitmqctl set_permissions -p / celery-worker .* .* .*
          when: "'celery-worker' not in vault_rabbitmq_users.stdout"
          changed_when: true
          tags: [vault, rabbitmq]

        # --- Redémarrage Celery (les secrets restaurés ci-dessus ne sont
        # relus par le Vault Agent Injector qu'au prochain démarrage de pod ;
        # idempotent : ne redémarre que si des pods celery ne sont pas Ready) ---

        - name: Lister les conteneurs celery non-Ready
          ansible.builtin.command: >-
            kubectl get pods -n {{ vault_secrets_celery_namespace }}
            -o jsonpath={.items[*].status.containerStatuses[?(@.ready==false)].name}
          register: vault_celery_not_ready
          changed_when: false
          tags: [vault, celery]

        - name: Forcer le redémarrage des déploiements celery
          ansible.builtin.command: >-
            kubectl rollout restart deployment -n {{ vault_secrets_celery_namespace }}
          when: (vault_celery_not_ready.stdout | default('') | trim) != ''
          changed_when: true
          tags: [vault, celery]

        # --- secret/postgres/superuser : utilisateur "postgres" (rôle postgres_ha, S3) ---

        - name: Vérifier si secret/postgres/superuser existe déjà dans Vault
          ansible.builtin.command: >-
            kubectl exec -n {{ vault_namespace }} {{ vault_release_name }}-0 -- sh -c
            'VAULT_TOKEN={{ vault_root_token }} vault kv get -field=password secret/postgres/superuser'
          register: vault_postgres_superuser_secret_check
          changed_when: false
          failed_when: false
          no_log: true
          tags: [vault, secrets]

        - name: Déterminer le mot de passe superuser PostgreSQL (existant ou généré)
          ansible.builtin.set_fact:
            vault_postgres_superuser_password: >-
              {{ vault_postgres_superuser_secret_check.stdout
              if vault_postgres_superuser_secret_check.rc == 0
              else lookup('ansible.builtin.password', '/dev/null length=32 chars=ascii_letters,digits') }}
          no_log: true
          tags: [vault, secrets]

        - name: Écrire secret/postgres/superuser dans Vault
          ansible.builtin.command: >-
            kubectl exec -n {{ vault_namespace }} {{ vault_release_name }}-0 -- sh -c
            'VAULT_TOKEN={{ vault_root_token }} vault kv put secret/postgres/superuser
            username=postgres
            password={{ vault_postgres_superuser_password }}'
          when: vault_postgres_superuser_secret_check.rc != 0
          changed_when: true
          no_log: true
          tags: [vault, secrets]

        # --- secret/postgres/app : utilisateur applicatif "appuser" (rôle postgres_ha, S3) ---

        - name: Vérifier si secret/postgres/app existe déjà dans Vault
          ansible.builtin.command: >-
            kubectl exec -n {{ vault_namespace }} {{ vault_release_name }}-0 -- sh -c
            'VAULT_TOKEN={{ vault_root_token }} vault kv get -field=password secret/postgres/app'
          register: vault_postgres_app_secret_check
          changed_when: false
          failed_when: false
          no_log: true
          tags: [vault, secrets]

        - name: Déterminer le mot de passe applicatif PostgreSQL (existant ou généré)
          ansible.builtin.set_fact:
            vault_postgres_app_password: >-
              {{ vault_postgres_app_secret_check.stdout
              if vault_postgres_app_secret_check.rc == 0
              else lookup('ansible.builtin.password', '/dev/null length=32 chars=ascii_letters,digits') }}
          no_log: true
          tags: [vault, secrets]

        - name: Écrire secret/postgres/app dans Vault
          ansible.builtin.command: >-
            kubectl exec -n {{ vault_namespace }} {{ vault_release_name }}-0 -- sh -c
            'VAULT_TOKEN={{ vault_root_token }} vault kv put secret/postgres/app
            username=appuser
            password={{ vault_postgres_app_password }}'
          when: vault_postgres_app_secret_check.rc != 0
          changed_when: true
          no_log: true
          tags: [vault, secrets]

        # --- secret/kubernetes-security-runtime/webhook-token : token
        # partagé pour le webhook S2 (decision 3, kubernetes-security-runtime
        # /docs/cadrage-s2-webhook-response.md) ---

        - name: Vérifier si secret/kubernetes-security-runtime/webhook-token existe déjà dans Vault
          ansible.builtin.command: >-
            kubectl exec -n {{ vault_namespace }} {{ vault_release_name }}-0 -- sh -c
            'VAULT_TOKEN={{ vault_root_token }} vault kv get -field=token secret/kubernetes-security-runtime/webhook-token'
          register: vault_webhook_token_check
          changed_when: false
          failed_when: false
          no_log: true
          tags: [vault, secrets]

        - name: Déterminer le token webhook (existant ou généré)
          ansible.builtin.set_fact:
            vault_webhook_token: "{{ vault_webhook_token_check.stdout
              if vault_webhook_token_check.rc == 0
              else lookup('ansible.builtin.password', '/dev/null length=48 chars=ascii_letters,digits') }}"
          no_log: true
          tags: [vault, secrets]

        - name: Écrire secret/kubernetes-security-runtime/webhook-token dans Vault
          ansible.builtin.command: >-
            kubectl exec -n {{ vault_namespace }} {{ vault_release_name }}-0 -- sh -c
            'VAULT_TOKEN={{ vault_root_token }} vault kv put secret/kubernetes-security-runtime/webhook-token
            token={{ vault_webhook_token }}'
          when: vault_webhook_token_check.rc != 0
          changed_when: true
          no_log: true
          tags: [vault, secrets]

        # --- Secret Kubernetes "webhook-token" (namespace falco), dérivé de
        # la valeur Vault ci-dessus. Deux clés : "token" (consommé par
        # webhook/app.py en env WEBHOOK_TOKEN) et "customheaders" (consommé
        # par le subchart falcosidekick en env WEBHOOK_CUSTOMHEADERS, déjà au
        # format "Authorization:Bearer <token>" attendu par Falcosidekick —
        # voir kubernetes-security-runtime/gitops/falcosidekick/values.yaml).
        # kubectl apply, pas create : rejouable, jamais committé (règle non
        # négociable #4 de kubernetes-security-runtime).

        - name: Pousser le Secret Kubernetes webhook-token dans le namespace falco
          ansible.builtin.shell: >-
            kubectl create secret generic webhook-token
            -n {{ vault_secrets_webhook_namespace }}
            --from-literal=token={{ vault_webhook_token | quote }}
            --from-literal=customheaders={{ ("Authorization:Bearer " ~ vault_webhook_token) | quote }}
            --dry-run=client -o yaml
            | kubectl apply -f -
          register: vault_webhook_secret_apply
          changed_when: "'unchanged' not in vault_webhook_secret_apply.stdout"
          no_log: true
          tags: [vault, secrets]
