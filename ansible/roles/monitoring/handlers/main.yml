---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true

- name: Restart prometheus
  ansible.builtin.command: docker compose -f {{ monitoring_base_dir }}/docker-compose.yml restart prometheus
  changed_when: true
  when: not ansible_check_mode

- name: Restart loki
  ansible.builtin.command: docker compose -f {{ monitoring_base_dir }}/docker-compose.yml restart loki
  changed_when: true
  when: not ansible_check_mode

- name: Restart grafana
  ansible.builtin.command: docker compose -f {{ monitoring_base_dir }}/docker-compose.yml restart grafana
  changed_when: true
  when: not ansible_check_mode

- name: Recreate monitoring stack
  # docker compose up -d est idempotent par construction : il ne recrée que
  # les services dont la définition (image, config montée) a changé.
  ansible.builtin.command: docker compose -f {{ monitoring_base_dir }}/docker-compose.yml up -d
  changed_when: true
  when: not ansible_check_mode
