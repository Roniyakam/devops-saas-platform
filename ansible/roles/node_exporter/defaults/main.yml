---
# Variables du rôle node_exporter — préfixées node_exporter_*
# Déploiement binaire + systemd sur les VMs hors Docker (infra, k8s-master,
# k8s-workers, postgres). vm-monitoring a son propre node-exporter via
# Docker Compose (roles/monitoring), pas ce rôle.

node_exporter_version: "v1.8.1"
node_exporter_port: 9100

node_exporter_user: "node_exporter"
node_exporter_group: "node_exporter"
node_exporter_install_dir: "/usr/local/bin"

node_exporter_archive_name: "node_exporter-{{ node_exporter_version[1:] }}.linux-amd64.tar.gz"
node_exporter_download_url: "https://github.com/prometheus/node_exporter/releases/download/{{ node_exporter_version }}/{{ node_exporter_archive_name }}"
# Vérifié contre le sha256sums.txt officiel de la release v1.8.1
# (node_exporter-1.8.1.linux-amd64.tar.gz) — règle non négociable n°5/8.
node_exporter_checksum_sha256: "fbadb376afa7c883f87f70795700a8a200f7fd45412532cc1938a24d41078011"

# UFW — IP jamais en dur ; résolution dynamique depuis le groupe d'inventaire
# monitoring (règle non négociable n°6), même pattern que postgres_ha_ufw_*_groups.
node_exporter_ufw_client_group: monitoring
