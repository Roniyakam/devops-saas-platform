---
# Variables du rôle k8s_worker — préfixées k8s_worker_*
# k3s_version est définie dans group_vars/all.yml

# Adresse IP du master (utilisée pour la jonction au cluster)
# À surcharger en inventaire ou vault si nécessaire
k8s_worker_master_ip: "{{ hostvars[groups['k8s_master'][0]]['ansible_host'] }}"

# Port API K3s
k8s_worker_k3s_api_port: "6443"

# Chemin local du script d'installation K3s téléchargé (get_url)
k8s_worker_k3s_install_script_path: "/tmp/k3s-install.sh"

# Fichier de configuration persistant de l'agent K3s
# Source de vérité relue par k3s-agent à chaque démarrage du service
# (contrairement aux variables d'environnement, figées au moment de l'install)
k8s_worker_k3s_agent_config_path: "/etc/rancher/k3s/config.yaml"
