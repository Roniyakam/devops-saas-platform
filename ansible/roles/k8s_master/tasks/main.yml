---
# Rôle k8s_master : installation K3s control-plane + ArgoCD bootstrap

- name: Vérifier si K3s est déjà installé
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k8s_master_k3s_binary
  tags: [k8s_master, k3s]

- name: Télécharger le script d'installation K3s
  ansible.builtin.get_url:
    url: https://get.k3s.io
    dest: "{{ k8s_master_k3s_install_script_path }}"
    mode: "0755"
  when: not k8s_master_k3s_binary.stat.exists
  tags: [k8s_master, k3s]

- name: Installer K3s control-plane
  # --disable : services embarqués désactivés car déployés via GitOps (ArgoCD)
  # Précédence Jinja2 : parenthèses obligatoires autour de la concaténation + filtre join
  ansible.builtin.shell: |
    set -o pipefail
    INSTALL_K3S_VERSION="{{ k3s_version }}" \
    {{ k8s_master_k3s_install_script_path }} server \
    --disable={{ ('--disable=' + (k8s_master_k3s_disable | join(','))) | regex_replace('^--disable=', '') }}
  args:
    creates: /usr/local/bin/k3s
    executable: /bin/bash
  when: not k8s_master_k3s_binary.stat.exists
  tags: [k8s_master, k3s]

- name: Attendre que le service K3s soit actif
  ansible.builtin.systemd:
    name: k3s
    state: started
    enabled: true
  tags: [k8s_master, k3s]

- name: Attendre que le nœud master soit Ready
  ansible.builtin.command: k3s kubectl get nodes
  register: k8s_master_nodes_status
  until: "'Ready' in k8s_master_nodes_status.stdout"
  retries: 20
  delay: 10
  changed_when: false
  tags: [k8s_master, k3s]

- name: Créer le répertoire local pour le kubeconfig
  ansible.builtin.file:
    path: "{{ k8s_master_kubeconfig_local_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false
  tags: [k8s_master, kubeconfig]

- name: Vérifier si le kubeconfig local référence déjà l'IP réelle du master
  # Le kubeconfig distant contient toujours 127.0.0.1 (généré ainsi par K3s) :
  # sans cette garde, fetch+replace s'exécuteraient à chaque run (idempotence cassée).
  ansible.builtin.command: >
    grep -q 'https://{{ ansible_host }}:6443' {{ k8s_master_kubeconfig_local_dir }}/{{ inventory_hostname }}-k3s.yaml
  register: k8s_master_kubeconfig_uptodate
  delegate_to: localhost
  become: false
  changed_when: false
  failed_when: false
  tags: [k8s_master, kubeconfig]

- name: Récupérer le kubeconfig en local
  ansible.builtin.fetch:
    src: "{{ k8s_master_kubeconfig_path }}"
    dest: "{{ k8s_master_kubeconfig_local_dir }}/{{ inventory_hostname }}-k3s.yaml"
    flat: true
  when: k8s_master_kubeconfig_uptodate.rc != 0
  tags: [k8s_master, kubeconfig]

- name: Corriger l'IP du kubeconfig local (127.0.0.1 -> IP réelle du master)
  ansible.builtin.replace:
    path: "{{ k8s_master_kubeconfig_local_dir }}/{{ inventory_hostname }}-k3s.yaml"
    regexp: 'https://127\.0\.0\.1:6443'
    replace: "https://{{ ansible_host }}:6443"
  delegate_to: localhost
  become: false
  when: k8s_master_kubeconfig_uptodate.rc != 0
  tags: [k8s_master, kubeconfig]

- name: Récupérer le token K3s pour les workers
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k8s_master_node_token_raw
  tags: [k8s_master, k3s]

- name: Stocker le token K3s dans les facts (accessible aux workers)
  ansible.builtin.set_fact:
    k3s_node_token: "{{ k8s_master_node_token_raw.content | b64decode | trim }}"
  tags: [k8s_master, k3s]

- name: Créer le namespace ArgoCD
  ansible.builtin.command: >
    k3s kubectl create namespace {{ k8s_master_argocd_namespace }}
  register: k8s_master_argocd_ns
  changed_when: "'created' in k8s_master_argocd_ns.stdout"
  failed_when:
    - k8s_master_argocd_ns.rc != 0
    - "'already exists' not in k8s_master_argocd_ns.stderr"
  tags: [k8s_master, argocd]

- name: Télécharger le manifeste ArgoCD (vérifié par checksum)
  ansible.builtin.get_url:
    url: "https://raw.githubusercontent.com/argoproj/argo-cd/{{ k8s_master_argocd_version }}/manifests/install.yaml"
    dest: "{{ k8s_master_argocd_manifest_path }}"
    checksum: "{{ k8s_master_argocd_manifest_checksum }}"
    mode: "0644"
  tags: [k8s_master, argocd]

- name: Calculer le diff ArgoCD par rapport à l'état du cluster
  # kubectl diff : rc=0 (aucun changement), rc=1 (changements détectés), rc>1 (erreur)
  ansible.builtin.command: >
    k3s kubectl diff -n {{ k8s_master_argocd_namespace }}
    -f {{ k8s_master_argocd_manifest_path }}
  register: k8s_master_argocd_diff
  changed_when: k8s_master_argocd_diff.rc == 1
  failed_when: k8s_master_argocd_diff.rc > 1
  tags: [k8s_master, argocd]

- name: Appliquer le manifeste ArgoCD si des changements sont détectés
  ansible.builtin.command: >
    k3s kubectl apply -n {{ k8s_master_argocd_namespace }}
    -f {{ k8s_master_argocd_manifest_path }}
  when: k8s_master_argocd_diff.rc == 1
  changed_when: true
  tags: [k8s_master, argocd]
