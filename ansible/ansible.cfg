[defaults]
inventory = inventories/scaleway/hosts.ini
roles_path = roles
host_key_checking = True
retry_files_enabled = False
# stdout_callback = yaml était cassé par community.general v12+
# Le remplacement officiel est le callback builtin "default" avec result_format=yaml
stdout_callback = default
callback_result_format = yaml
interpreter_python = auto_silent
deprecation_warnings = False

[privilege_escalation]
become = False
become_method = sudo
